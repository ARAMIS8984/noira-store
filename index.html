<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIRA — Un nombre. Dos esencias.</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&family=Work+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display:'Bodoni Moda', serif;
    --font-body:'Work Sans', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --radius:2px;
    --dark-bg:#15151A;
    --dark-surface:#1D1D23;
    --dark-text:#ECECE8;
    --dark-muted:#8A8A92;
    --dark-accent:#A8875A;
    --dark-accent-2:#7A2E36;
    --dark-border:#2C2C34;

    --light-bg:#FBF3EE;
    --light-surface:#FFFFFF;
    --light-text:#2B1B24;
    --light-muted:#9C818A;
    --light-accent:#C97B84;
    --light-accent-2:#B08A4E;
    --light-border:#EBD9D0;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);
    min-height:100vh;
    overflow-x:hidden;
    background:var(--dark-bg);
    color:var(--dark-text);
    transition:background-color .5s ease, color .5s ease;
  }
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{transition-duration:.01ms !important; animation-duration:.01ms !important;}
  }

  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  :focus-visible{outline:2px solid currentColor; outline-offset:3px;}

  /* ===================== LANDING (selector) ===================== */
  #landing{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(90deg,
      var(--dark-bg) 0%, var(--dark-bg) 48%,
      var(--light-bg) 52%, var(--light-bg) 100%);
    overflow:hidden;
  }
  #landing::before{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent 45%, rgba(0,0,0,.22) 50%, transparent 55%);
    pointer-events:none;
  }
  .landing-inner{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2.2rem;
    text-align:center;
    padding:2rem;
  }

  .wordmark-wrap{ position:relative; display:inline-block; }
  .wordmark{
    display:block;
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(3.2rem, 12vw, 8rem);
    letter-spacing:.04em;
    line-height:1;
    white-space:nowrap;
    user-select:none;
  }
  .wordmark-dark{
    color:#fff;
    text-shadow:0 3px 2px rgba(0,0,0,.55), 0 -1px 0 rgba(255,255,255,.2);
    clip-path:inset(0 50% 0 0);
  }
  .wordmark-light{
    position:absolute; top:0; left:0;
    color:var(--light-text);
    text-shadow:0 1px 0 rgba(255,255,255,.75), 0 -1px 0 rgba(0,0,0,.12);
    clip-path:inset(0 0 0 50%);
  }
  .letter{
    display:inline-block;
    transition:color .45s ease, text-shadow .45s ease, transform .45s ease;
  }
  .wordmark-dark .letter:hover{
    color:#E9D2A8;
    text-shadow:0 0 16px rgba(233,210,168,.55), 0 3px 2px rgba(0,0,0,.4);
    transform:translateY(-4px);
  }
  .wordmark-light .letter:hover{
    color:#A97A3E;
    text-shadow:0 0 12px rgba(169,122,62,.4), 0 1px 0 rgba(255,255,255,.6);
    transform:translateY(-4px);
  }
  .seam-line{
    position:absolute; top:6%; bottom:6%; left:50%;
    width:2px; transform:translateX(-50%);
    background:linear-gradient(180deg, transparent, #D9BC85 18%, #D9BC85 82%, transparent);
    box-shadow:0 0 10px rgba(217,188,133,.55);
  }

  .tagline-wrap{ position:relative; display:inline-block; }
  .tagline-half{
    display:block;
    font-family:var(--font-body);
    font-weight:400;
    font-size:.85rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .tagline-dark{ color:rgba(255,255,255,.9); clip-path:inset(0 50% 0 0); }
  .tagline-light{
    position:absolute; top:0; left:0;
    color:rgba(43,27,36,.78);
    clip-path:inset(0 0 0 50%);
  }

  .gender-picks{ display:flex; gap:1.1rem; }
  .gender-picks button{
    padding:.9rem 2.3rem;
    font-family:var(--font-body);
    font-size:.78rem;
    font-weight:600;
    letter-spacing:.2em;
    border-radius:999px;
    transition:background-color .25s ease, color .25s ease;
  }
  .pick-dark{
    color:#fff;
    border:1px solid rgba(255,255,255,.65);
    background:rgba(255,255,255,.05);
  }
  .pick-dark:hover{ background:#fff; color:var(--dark-bg); }
  .pick-light{
    color:var(--light-text);
    border:1px solid rgba(43,27,36,.5);
    background:rgba(255,255,255,.5);
  }
  .pick-light:hover{ background:var(--light-text); color:var(--light-bg); }

  /* ===================== CATALOG ===================== */
  #catalog{ display:none; min-height:100vh; }
  #catalog.show{ display:block; }
  #landing.hide{ display:none; }

  body[data-theme="hombre"] #catalog{
    background:var(--dark-bg); color:var(--dark-text);
  }
  body[data-theme="mujer"] #catalog{
    background:var(--light-bg); color:var(--light-text);
  }

  .top-bar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:1.1rem 1.75rem;
    backdrop-filter:blur(10px);
  }
  body[data-theme="hombre"] .top-bar{ background:rgba(21,21,26,.85); border-bottom:1px solid var(--dark-border); }
  body[data-theme="mujer"] .top-bar{ background:rgba(251,243,238,.85); border-bottom:1px solid var(--light-border); }

  .brand{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1.5rem;
    letter-spacing:.05em;
  }

  .rail-toggle{
    display:flex; align-items:center; position:relative;
    border-radius:999px; padding:3px; font-size:.68rem;
    letter-spacing:.14em; font-weight:600;
  }
  body[data-theme="hombre"] .rail-toggle{ background:var(--dark-surface); border:1px solid var(--dark-border); }
  body[data-theme="mujer"] .rail-toggle{ background:var(--light-surface); border:1px solid var(--light-border); }
  .rail-toggle button{
    position:relative; z-index:2;
    padding:.5rem 1.1rem; border-radius:999px;
    transition:color .3s ease;
  }
  .rail-pill{
    position:absolute; top:3px; bottom:3px; left:3px;
    width:calc(50% - 3px); border-radius:999px;
    transition:transform .35s cubic-bezier(.65,0,.35,1), background-color .35s ease;
    z-index:1;
  }
  body[data-theme="hombre"] .rail-pill{ background:var(--dark-accent); }
  body[data-theme="mujer"] .rail-pill{ background:var(--light-accent); }
  body[data-theme="mujer"] .rail-toggle .rail-pill{ transform:translateX(100%); }
  body[data-theme="hombre"] .rail-toggle button:first-child,
  body[data-theme="mujer"] .rail-toggle button:last-child{ color:#fff; }

  .hero-strip{
    padding:3.5rem 1.75rem 2.5rem;
    text-align:center;
  }
  .hero-strip h1{
    font-family:var(--font-display);
    font-weight:600;
    font-style:italic;
    font-size:clamp(1.8rem, 4.5vw, 3rem);
    letter-spacing:.01em;
  }
  .hero-strip p{
    margin-top:.6rem; font-size:.85rem; letter-spacing:.08em;
    text-transform:uppercase;
  }
  body[data-theme="hombre"] .hero-strip p{ color:var(--dark-muted); }
  body[data-theme="mujer"] .hero-strip p{ color:var(--light-muted); }

  .tabs{
    display:flex; justify-content:center; gap:.5rem;
    padding:0 1.75rem 2rem;
  }
  .tab{
    position:relative;
    padding:.6rem 1.6rem;
    font-size:.72rem; font-weight:600; letter-spacing:.18em;
    clip-path:polygon(8% 0,100% 0,92% 100%,0 100%);
  }
  body[data-theme="hombre"] .tab{ color:var(--dark-muted); }
  body[data-theme="mujer"] .tab{ color:var(--light-muted); }
  .tab.active{ }
  body[data-theme="hombre"] .tab.active{ color:var(--dark-text); background:var(--dark-surface); }
  body[data-theme="mujer"] .tab.active{ color:var(--light-text); background:var(--light-surface); }

  .grid{
    max-width:1200px; margin:0 auto;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:1.6rem; padding:0 1.75rem 4rem;
  }
  .card{
    border-radius:var(--radius);
    overflow:hidden;
    transition:transform .3s ease, box-shadow .3s ease;
  }
  .card:hover{ transform:translateY(-4px); }
  body[data-theme="hombre"] .card{ background:var(--dark-surface); border:1px solid var(--dark-border); }
  body[data-theme="mujer"] .card{ background:var(--light-surface); border:1px solid var(--light-border); }

  .card-img{
    position:relative;
    aspect-ratio:1/1; width:100%;
    display:flex; align-items:center; justify-content:center;
    background-size:cover; background-position:center;
    font-size:.7rem; letter-spacing:.1em; text-transform:uppercase;
  }
  body[data-theme="hombre"] .card-img{ background-color:#101014; color:var(--dark-muted); }
  body[data-theme="mujer"] .card-img{ background-color:#F3E6DF; color:var(--light-muted); }

  .badge-row{ position:absolute; top:.6rem; left:.6rem; display:flex; gap:.35rem; }
  .badge{
    font-family:var(--font-mono); font-size:.6rem; letter-spacing:.06em;
    text-transform:uppercase; padding:.25rem .55rem; border-radius:999px;
    color:#fff;
  }
  .badge-launch{ background:#8A6A3A; }
  .badge-sale{ background:#7A2E36; }

  .video-link{
    display:inline-block; font-size:.7rem; font-weight:600;
    letter-spacing:.05em; margin-bottom:.6rem;
  }
  body[data-theme="hombre"] .video-link{ color:var(--dark-accent); }
  body[data-theme="mujer"] .video-link{ color:var(--light-accent-2); }

  .price-wrap{ display:flex; align-items:baseline; gap:.5rem; }
  .price-old{
    font-family:var(--font-mono); font-size:.78rem;
    text-decoration:line-through; opacity:.55;
  }

  .card-body{ padding:1rem 1.1rem 1.2rem; }
  .card-brand{
    font-family:var(--font-mono);
    font-size:.65rem; letter-spacing:.14em; text-transform:uppercase;
  }
  body[data-theme="hombre"] .card-brand{ color:var(--dark-accent); }
  body[data-theme="mujer"] .card-brand{ color:var(--light-accent-2); }
  .card-name{ font-size:1rem; font-weight:500; margin:.35rem 0 .15rem; }
  .card-sizes{ font-size:.72rem; margin-bottom:.7rem; }
  body[data-theme="hombre"] .card-sizes{ color:var(--dark-muted); }
  body[data-theme="mujer"] .card-sizes{ color:var(--light-muted); }
  .card-foot{ display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
  .card-price{ font-family:var(--font-mono); font-weight:600; font-size:1rem; }
  .wa-btn{
    display:inline-flex; align-items:center; gap:.35rem;
    padding:.55rem 1rem; border-radius:999px;
    font-size:.7rem; font-weight:600; letter-spacing:.06em;
    transition:opacity .2s ease;
  }
  .wa-btn:hover{ opacity:.85; }
  body[data-theme="hombre"] .wa-btn{ background:var(--dark-accent-2); color:#fff; }
  body[data-theme="mujer"] .wa-btn{ background:var(--light-accent-2); color:#fff; }

  .empty-state{
    max-width:1200px; margin:0 auto; padding:3rem 1.75rem 5rem;
    text-align:center; font-size:.9rem; letter-spacing:.03em;
  }
  body[data-theme="hombre"] .empty-state{ color:var(--dark-muted); }
  body[data-theme="mujer"] .empty-state{ color:var(--light-muted); }

  footer{
    padding:2.2rem 1.75rem; text-align:center;
    font-family:var(--font-mono); font-size:.65rem; letter-spacing:.1em;
  }
  body[data-theme="hombre"] footer{ border-top:1px solid var(--dark-border); color:var(--dark-muted); }
  body[data-theme="mujer"] footer{ border-top:1px solid var(--light-border); color:var(--light-muted); }

  @media (max-width:560px){
    .gender-picks{ flex-direction:column; align-items:center; gap:.75rem; }
  }

  /* ===================== ADMIN: botón discreto, login, panel ===================== */
  :root{
    --adm-bg:#121216; --adm-surface:#1B1B21; --adm-surface-2:#232329;
    --adm-text:#ECECE8; --adm-muted:#8A8A92; --adm-border:#2C2C34;
    --adm-accent:#A8875A; --adm-danger:#7A2E36; --adm-good:#4E8C6B;
  }

  #adminTrigger{
    position:fixed; right:1.1rem; bottom:1.1rem; z-index:40;
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.85rem; color:rgba(255,255,255,.35);
    background:rgba(0,0,0,.15); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.12);
    transition:opacity .3s ease, color .3s ease, background .3s ease;
    opacity:.55;
  }
  #adminTrigger:hover{ opacity:1; color:#D9BC85; border-color:rgba(217,188,133,.5); }
  #adminTrigger.logged{ color:#D9BC85; border-color:rgba(217,188,133,.6); }

  .adm-overlay{
    display:none; position:fixed; inset:0; z-index:50;
    background:rgba(10,10,12,.72); backdrop-filter:blur(4px);
    align-items:center; justify-content:center; padding:1.25rem;
  }
  .adm-overlay.show{ display:flex; }

  .adm-card{
    background:var(--adm-surface); border:1px solid var(--adm-border);
    border-radius:10px; color:var(--adm-text); font-family:var(--font-body);
    width:100%; max-width:340px; padding:2rem 1.75rem;
  }
  .adm-card h2{
    font-family:var(--font-display); font-weight:700; font-size:1.3rem;
    margin-bottom:.3rem;
  }
  .adm-card .adm-sub{ font-size:.75rem; color:var(--adm-muted); margin-bottom:1.4rem; }
  .adm-field{ margin-bottom:1rem; }
  .adm-field label{
    display:block; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase;
    color:var(--adm-muted); margin-bottom:.4rem;
  }
  .adm-field input, .adm-field select, .adm-field textarea{
    width:100%; background:var(--adm-surface-2); border:1px solid var(--adm-border);
    color:var(--adm-text); padding:.6rem .7rem; border-radius:5px;
    font-family:var(--font-body); font-size:.85rem;
  }
  .adm-field input:focus, .adm-field select:focus, .adm-field textarea:focus{ outline:1px solid var(--adm-accent); }
  .adm-btn{
    width:100%; padding:.7rem; border-radius:999px; font-size:.78rem;
    font-weight:600; letter-spacing:.06em; background:var(--adm-accent); color:#15151A;
  }
  .adm-btn:hover{ opacity:.9; }
  .adm-btn.danger{ background:var(--adm-danger); color:#fff; }
  .adm-btn.ghost{ background:transparent; border:1px solid var(--adm-border); color:var(--adm-text); }
  .adm-msg{ font-size:.75rem; margin-top:.8rem; min-height:1em; }
  .adm-msg.ok{ color:var(--adm-good); }
  .adm-msg.err{ color:#E07C87; }
  .adm-close{ position:absolute; top:1rem; right:1.1rem; font-size:1.1rem; color:var(--adm-muted); }

  .adm-panel{
    position:relative; background:var(--adm-bg); border:1px solid var(--adm-border);
    border-radius:10px; width:100%; max-width:980px; max-height:92vh;
    overflow-y:auto; color:var(--adm-text); font-family:var(--font-body);
  }
  .adm-panel-head{
    position:sticky; top:0; z-index:2; display:flex; align-items:center; justify-content:space-between;
    padding:1.25rem 1.75rem; border-bottom:1px solid var(--adm-border);
    background:var(--adm-bg);
  }
  .adm-panel-head h2{ font-family:var(--font-display); font-size:1.3rem; }
  .adm-panel-head-actions{ display:flex; align-items:center; gap:.9rem; }
  .adm-logout{ font-size:.72rem; color:var(--adm-muted); letter-spacing:.05em; }
  .adm-logout:hover{ color:var(--adm-danger); }
  .adm-body{ padding:1.75rem; }

  .adm-grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .adm-grid-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
  .adm-checkline{ display:flex; align-items:center; gap:.5rem; font-size:.8rem; margin-top:.3rem; }
  .adm-checkline input{ width:auto; }

  .adm-table-wrap{ margin-top:2rem; overflow-x:auto; }
  .adm-table{ width:100%; border-collapse:collapse; font-size:.8rem; min-width:720px; }
  .adm-table th, .adm-table td{ text-align:left; padding:.6rem .5rem; border-bottom:1px solid var(--adm-border); }
  .adm-table th{ color:var(--adm-muted); font-size:.65rem; text-transform:uppercase; letter-spacing:.06em; }
  .adm-thumb{ width:34px; height:34px; border-radius:4px; background-size:cover; background-position:center; background-color:var(--adm-surface-2); }
  .adm-tag{ font-size:.65rem; padding:.15rem .5rem; border-radius:999px; border:1px solid var(--adm-border); color:var(--adm-muted); }
  .adm-row-actions{ display:flex; gap:.6rem; }
  .adm-row-actions button{ font-size:.72rem; color:var(--adm-accent); }
  .adm-row-actions button.del{ color:var(--adm-danger); }
  .adm-row-actions button:hover{ text-decoration:underline; }

  @media (max-width:640px){
    .adm-grid-2, .adm-grid-3{ grid-template-columns:1fr; }
  }
</style>
</head>
<body data-theme="neutral">

  <section id="landing">
    <div class="landing-inner">
      <div class="wordmark-wrap">
        <span class="wordmark wordmark-dark"><span class="letter">N</span><span class="letter">O</span><span class="letter">I</span><span class="letter">R</span><span class="letter">A</span></span>
        <span class="wordmark wordmark-light" aria-hidden="true"><span class="letter">N</span><span class="letter">O</span><span class="letter">I</span><span class="letter">R</span><span class="letter">A</span></span>
        <span class="seam-line"></span>
      </div>
      <div class="tagline-wrap">
        <span class="tagline-half tagline-dark">Un nombre. Dos esencias.</span>
        <span class="tagline-half tagline-light" aria-hidden="true">Un nombre. Dos esencias.</span>
      </div>
      <div class="gender-picks">
        <button type="button" class="pick-dark" data-choose="hombre">Hombre</button>
        <button type="button" class="pick-light" data-choose="mujer">Mujer</button>
      </div>
    </div>
  </section>

  <section id="catalog">
    <div class="top-bar">
      <div class="brand">NOIRA</div>
      <div class="rail-toggle">
        <div class="rail-pill"></div>
        <button type="button" data-choose="hombre">Hombre</button>
        <button type="button" data-choose="mujer">Mujer</button>
      </div>
    </div>

    <div class="hero-strip">
      <h1 id="heroTitle">La colección para él</h1>
      <p id="heroSub">Tenis y ropa seleccionados</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-cat="tenis">Tenis</button>
      <button class="tab" data-cat="ropa">Ropa</button>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">Aún no hay productos cargados en esta categoría. Vuelve pronto.</div>

    <footer>NOIRA © 2026 — Pedidos por WhatsApp</footer>
  </section>

  <!-- Botón discreto de administrador -->
  <button id="adminTrigger" type="button" title="Administrador">◆</button>

  <!-- Login -->
  <div class="adm-overlay" id="loginOverlay">
    <div class="adm-card" style="position:relative;">
      <button class="adm-close" id="loginClose" type="button">✕</button>
      <h2>Acceso NOIRA</h2>
      <div class="adm-sub">Solo administradores</div>
      <form id="loginForm">
        <div class="adm-field">
          <label>Correo</label>
          <input type="email" id="loginEmail" required autocomplete="username">
        </div>
        <div class="adm-field">
          <label>Contraseña</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="adm-btn" id="loginBtn">Entrar</button>
        <div class="adm-msg" id="loginMsg"></div>
      </form>
    </div>
  </div>

  <!-- Panel de administración -->
  <div class="adm-overlay" id="adminOverlay">
    <div class="adm-panel">
      <div class="adm-panel-head">
        <h2>Panel NOIRA</h2>
        <div class="adm-panel-head-actions">
          <button class="adm-logout" id="logoutBtn" type="button">Cerrar sesión</button>
          <button class="adm-close" id="adminClose" type="button" style="position:static;">✕</button>
        </div>
      </div>
      <div class="adm-body">
        <form id="productForm">
          <input type="hidden" id="editingId">
          <div class="adm-grid-2">
            <div class="adm-field">
              <label>Marca</label>
              <input type="text" id="f_brand" required placeholder="Nike, Adidas...">
            </div>
            <div class="adm-field">
              <label>Nombre del producto</label>
              <input type="text" id="f_name" required placeholder="Air Max 90">
            </div>
          </div>

          <div class="adm-grid-3">
            <div class="adm-field">
              <label>Categoría</label>
              <select id="f_category" required>
                <option value="tenis">Tenis</option>
                <option value="ropa">Ropa</option>
              </select>
            </div>
            <div class="adm-field">
              <label>Género</label>
              <select id="f_gender" required>
                <option value="hombre">Hombre</option>
                <option value="mujer">Mujer</option>
              </select>
            </div>
            <div class="adm-field">
              <label>Activo (visible en catálogo)</label>
              <select id="f_active">
                <option value="true">Sí</option>
                <option value="false">No</option>
              </select>
            </div>
          </div>

          <div class="adm-grid-3">
            <div class="adm-field">
              <label>Precio (COP)</label>
              <input type="number" id="f_price" required min="0" step="1000" placeholder="250000">
            </div>
            <div class="adm-field">
              <label>Precio de oferta (opcional)</label>
              <input type="number" id="f_sale_price" min="0" step="1000" placeholder="199000">
            </div>
            <div class="adm-field">
              <label>Costo — uso interno</label>
              <input type="number" id="f_cost" min="0" step="1000" placeholder="150000">
            </div>
          </div>

          <div class="adm-checkline">
            <input type="checkbox" id="f_on_launch">
            <label for="f_on_launch" style="margin:0; text-transform:none; font-size:.8rem; color:var(--adm-text);">Marcar como lanzamiento</label>
          </div>

          <div class="adm-field" style="margin-top:1rem;">
            <label>Tallas disponibles</label>
            <input type="text" id="f_sizes" placeholder="Ej: 38, 39, 40, 41">
          </div>

          <div class="adm-grid-2" style="margin-top:1rem;">
            <div class="adm-field">
              <label>Imagen</label>
              <input type="file" id="f_imageFile" accept="image/*">
              <div style="font-size:.68rem; color:var(--adm-muted); margin-top:.3rem;" id="imgStatus"></div>
            </div>
            <div class="adm-field">
              <label>Video (opcional)</label>
              <input type="file" id="f_videoFile" accept="video/*">
              <div style="font-size:.68rem; color:var(--adm-muted); margin-top:.3rem;" id="vidStatus"></div>
            </div>
          </div>

          <div class="adm-field">
            <label>Descripción (opcional)</label>
            <textarea id="f_description" style="min-height:70px;"></textarea>
          </div>

          <div style="display:flex; gap:.8rem; align-items:center;">
            <button type="submit" class="adm-btn" id="submitBtn" style="width:auto; padding:.7rem 1.8rem;">Guardar producto</button>
            <button type="button" class="adm-btn ghost" id="cancelEditBtn" style="width:auto; padding:.7rem 1.4rem; display:none;">Cancelar edición</button>
          </div>
          <div class="adm-msg" id="formMsg"></div>
        </form>

        <div class="adm-table-wrap">
          <table class="adm-table">
            <thead>
              <tr><th></th><th>Producto</th><th>Cat.</th><th>Género</th><th>Precio</th><th>Estado</th><th></th></tr>
            </thead>
            <tbody id="adminTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://dwmcoigymyolmblmhwjd.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3bWNvaWd5bXlvbG1ibG1od2pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NjU3OTIsImV4cCI6MjA5OTQ0MTc5Mn0.sN0MRi27neNAusHmakwV6P44WrtDgjn9M4Ge3JbjIV8';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const WHATSAPP_NUMBER = '573006586453';

  let state = { gender: 'hombre', category: 'tenis' };

  const heroCopy = {
    hombre: { title: 'La colección para él', sub: 'Tenis y ropa seleccionados' },
    mujer:  { title: 'La colección para ella', sub: 'Tenis y ropa seleccionados' }
  };

  function chooseGender(g){
    state.gender = g;
    document.body.setAttribute('data-theme', g);
    document.getElementById('landing').classList.add('hide');
    document.getElementById('catalog').classList.add('show');
    document.getElementById('heroTitle').textContent = heroCopy[g].title;
    document.getElementById('heroSub').textContent = heroCopy[g].sub;
    loadProducts();
  }

  document.querySelectorAll('[data-choose]').forEach(btn=>{
    btn.addEventListener('click', ()=> chooseGender(btn.dataset.choose));
  });

  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      state.category = tab.dataset.cat;
      loadProducts();
    });
  });

  function formatPrice(n){
    return '$' + Number(n).toLocaleString('es-CO');
  }

  function waLink(p){
    const msg = `Hola NOIRA, me interesa: ${p.brand} ${p.name} — ${formatPrice(p.price)}`;
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  }

  async function loadProducts(){
    const grid = document.getElementById('grid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';

    const { data, error } = await sb
      .from('noira_public_products')
      .select('*')
      .eq('gender', state.gender)
      .eq('category', state.category)
      .order('created_at', { ascending: false });

    if(error){
      console.error(error);
      empty.style.display = 'block';
      empty.textContent = 'No se pudieron cargar los productos. Intenta de nuevo.';
      return;
    }

    if(!data || data.length === 0){
      empty.style.display = 'block';
      empty.textContent = 'Aún no hay productos cargados en esta categoría. Vuelve pronto.';
      return;
    }

    empty.style.display = 'none';

    data.forEach(p=>{
      const sizes = (p.sizes && p.sizes.length) ? 'Tallas: ' + p.sizes.join(', ') : '';
      const hasSale = p.sale_price && Number(p.sale_price) < Number(p.price);
      const priceHtml = hasSale
        ? `<span class="price-old">${formatPrice(p.price)}</span><span class="card-price">${formatPrice(p.sale_price)}</span>`
        : `<span class="card-price">${formatPrice(p.price)}</span>`;
      const badges = `${p.on_launch ? '<span class="badge badge-launch">Lanzamiento</span>' : ''}${hasSale ? '<span class="badge badge-sale">Oferta</span>' : ''}`;
      const videoLink = p.video_url ? `<a class="video-link" href="${p.video_url}" target="_blank" rel="noopener">▶ Ver video</a>` : '';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-img" style="${p.image_url ? `background-image:url('${p.image_url}')` : ''}">
          ${p.image_url ? '' : 'Sin imagen'}
          ${badges ? `<div class="badge-row">${badges}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-brand">${p.brand || ''}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-sizes">${sizes}</div>
          ${videoLink}
          <div class="card-foot">
            <div class="price-wrap">${priceHtml}</div>
            <a class="wa-btn" href="${waLink(p)}" target="_blank" rel="noopener">Pedir</a>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  /* ===================== ADMIN: auth + CRUD ===================== */
  const adminTrigger = document.getElementById('adminTrigger');
  const loginOverlay = document.getElementById('loginOverlay');
  const adminOverlay = document.getElementById('adminOverlay');

  function openLogin(){ loginOverlay.classList.add('show'); }
  function closeLogin(){ loginOverlay.classList.remove('show'); document.getElementById('loginMsg').textContent=''; }
  function openAdmin(){ adminOverlay.classList.add('show'); loadAdminTable(); }
  function closeAdmin(){ adminOverlay.classList.remove('show'); }

  adminTrigger.addEventListener('click', async ()=>{
    const { data } = await sb.auth.getSession();
    if(data.session){ openAdmin(); } else { openLogin(); }
  });
  document.getElementById('loginClose').addEventListener('click', closeLogin);
  document.getElementById('adminClose').addEventListener('click', closeAdmin);

  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const msg = document.getElementById('loginMsg');
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    if(error){
      msg.textContent = 'Correo o contraseña incorrectos.';
      msg.className = 'adm-msg err';
      return;
    }
    msg.textContent = '';
    document.getElementById('loginForm').reset();
    closeLogin();
    adminTrigger.classList.add('logged');
    openAdmin();
  });

  document.getElementById('logoutBtn').addEventListener('click', async ()=>{
    await sb.auth.signOut();
    adminTrigger.classList.remove('logged');
    closeAdmin();
  });

  sb.auth.onAuthStateChange((_event, session)=>{
    if(session) adminTrigger.classList.add('logged');
    else adminTrigger.classList.remove('logged');
  });
  sb.auth.getSession().then(({data})=>{ if(data.session) adminTrigger.classList.add('logged'); });

  // --- Subida de archivos ---
  let pendingImageUrl = null;
  let pendingVideoUrl = null;

  async function uploadToBucket(file, statusEl){
    statusEl.textContent = 'Subiendo...';
    const path = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_')}`;
    const { error } = await sb.storage.from('noira-images').upload(path, file);
    if(error){ statusEl.textContent = 'Error: ' + error.message; return null; }
    const { data } = sb.storage.from('noira-images').getPublicUrl(path);
    statusEl.textContent = 'Listo ✓';
    return data.publicUrl;
  }

  document.getElementById('f_imageFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const url = await uploadToBucket(file, document.getElementById('imgStatus'));
    if(url) pendingImageUrl = url;
  });
  document.getElementById('f_videoFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const url = await uploadToBucket(file, document.getElementById('vidStatus'));
    if(url) pendingVideoUrl = url;
  });

  // --- Guardar / actualizar producto ---
  function resetForm(){
    document.getElementById('productForm').reset();
    document.getElementById('editingId').value = '';
    document.getElementById('cancelEditBtn').style.display = 'none';
    document.getElementById('submitBtn').textContent = 'Guardar producto';
    document.getElementById('imgStatus').textContent = '';
    document.getElementById('vidStatus').textContent = '';
    pendingImageUrl = null;
    pendingVideoUrl = null;
  }

  document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

  document.getElementById('productForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const msg = document.getElementById('formMsg');
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    const sizesRaw = document.getElementById('f_sizes').value;
    const sizes = sizesRaw.split(',').map(s=>s.trim()).filter(Boolean);
    const editingId = document.getElementById('editingId').value;

    const payload = {
      brand: document.getElementById('f_brand').value.trim(),
      name: document.getElementById('f_name').value.trim(),
      category: document.getElementById('f_category').value,
      gender: document.getElementById('f_gender').value,
      price: Number(document.getElementById('f_price').value),
      sale_price: document.getElementById('f_sale_price').value ? Number(document.getElementById('f_sale_price').value) : null,
      cost: document.getElementById('f_cost').value ? Number(document.getElementById('f_cost').value) : null,
      on_launch: document.getElementById('f_on_launch').checked,
      sizes: sizes,
      description: document.getElementById('f_description').value.trim() || null,
      active: document.getElementById('f_active').value === 'true'
    };
    if(pendingImageUrl) payload.image_url = pendingImageUrl;
    if(pendingVideoUrl) payload.video_url = pendingVideoUrl;

    let error;
    if(editingId){
      ({ error } = await sb.from('noira_products').update(payload).eq('id', editingId));
    } else {
      ({ error } = await sb.from('noira_products').insert(payload));
    }
    btn.disabled = false;

    if(error){
      msg.textContent = 'Error guardando: ' + error.message;
      msg.className = 'adm-msg err';
      return;
    }

    msg.textContent = editingId ? 'Producto actualizado ✓' : 'Producto guardado ✓';
    msg.className = 'adm-msg ok';
    resetForm();
    loadAdminTable();
  });

  async function loadAdminTable(){
    const tbody = document.getElementById('adminTable');
    tbody.innerHTML = '<tr><td colspan="7">Cargando...</td></tr>';

    const { data, error } = await sb
      .from('noira_products')
      .select('*')
      .order('created_at', { ascending:false });

    if(error){
      tbody.innerHTML = `<tr><td colspan="7">Error: ${error.message}</td></tr>`;
      return;
    }
    if(!data || data.length === 0){
      tbody.innerHTML = '<tr><td colspan="7">Aún no hay productos.</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    data.forEach(p=>{
      const tr = document.createElement('tr');
      const priceCell = p.sale_price
        ? `<span style="text-decoration:line-through; opacity:.5;">${formatPrice(p.price)}</span> ${formatPrice(p.sale_price)}`
        : formatPrice(p.price);
      tr.innerHTML = `
        <td><div class="adm-thumb" style="${p.image_url ? `background-image:url('${p.image_url}')` : ''}"></div></td>
        <td>${p.brand} — ${p.name}</td>
        <td><span class="adm-tag">${p.category}</span></td>
        <td><span class="adm-tag">${p.gender}</span></td>
        <td>${priceCell}</td>
        <td><span class="adm-tag">${p.active ? 'Activo' : 'Oculto'}</span></td>
        <td>
          <div class="adm-row-actions">
            <button data-edit="${p.id}">Editar</button>
            <button class="del" data-del="${p.id}">Eliminar</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('[data-edit]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const p = data.find(x=>x.id === b.dataset.edit);
        if(!p) return;
        document.getElementById('editingId').value = p.id;
        document.getElementById('f_brand').value = p.brand || '';
        document.getElementById('f_name').value = p.name || '';
        document.getElementById('f_category').value = p.category;
        document.getElementById('f_gender').value = p.gender;
        document.getElementById('f_price').value = p.price;
        document.getElementById('f_sale_price').value = p.sale_price || '';
        document.getElementById('f_cost').value = p.cost || '';
        document.getElementById('f_on_launch').checked = !!p.on_launch;
        document.getElementById('f_sizes').value = (p.sizes||[]).join(', ');
        document.getElementById('f_description').value = p.description || '';
        document.getElementById('f_active').value = p.active ? 'true' : 'false';
        pendingImageUrl = null; pendingVideoUrl = null;
        document.getElementById('imgStatus').textContent = p.image_url ? 'Imagen actual conservada si no subes otra' : '';
        document.getElementById('vidStatus').textContent = p.video_url ? 'Video actual conservado si no subes otro' : '';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        document.getElementById('submitBtn').textContent = 'Actualizar producto';
        document.getElementById('productForm').scrollIntoView({ behavior:'smooth' });
      });
    });

    tbody.querySelectorAll('[data-del]').forEach(b=>{
      b.addEventListener('click', async ()=>{
        if(!confirm('¿Eliminar este producto definitivamente?')) return;
        await sb.from('noira_products').delete().eq('id', b.dataset.del);
        loadAdminTable();
      });
    });
  }
</script>
</body>
</html>
